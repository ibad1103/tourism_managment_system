{% extends "layout.html" %}
{% block title %}Book Trip{% endblock %}

{% block content %}
<div class="bg-gradient-to-br from-blue-50 to-indigo-100 py-12 min-h-screen">
  <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl p-8">
    <h1 class="text-3xl font-bold text-center text-indigo-700 mb-6">
      Book {{ deal.title }}
    </h1>

    <form method="POST" class="space-y-5">
      {% csrf_token %}
      {{ form.non_field_errors }}

      {% for field in form %}
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
          <p class="text-red-500 text-sm mt-1">{{ field.errors|striptags }}</p>
        {% endif %}
      </div>
      {% endfor %}

      <div class="pt-8">
        <button type="submit"
          class="w-full bg-gradient-to-r from-indigo-500 via-purple-500 to-black-500
                 text-black font-semibold py-3 rounded-xl shadow-md
                 hover:from-pink-500 hover:to-indigo-500 transition duration-300">
          🚀 Submit Booking
        </button>
      </div>
    </form>
  </div>
</div>

<!-- Make form inputs colorful and clean -->
<style>
  input, textarea, select {
    width: 100%;
    padding: 0.75rem;
    border-radius: 0.75rem;
    border: 2px solid #e5e7eb;
    background-color: #f9fafb;
    transition: all 0.3s ease;
  }
  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: #6366f1;
    background-color: #eef2ff;
    box-shadow: 0 0 5px rgba(99, 102, 241, 0.3);
  }
</style>
{% endblock %}
