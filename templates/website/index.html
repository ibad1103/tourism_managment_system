{% extends "layout.html" %}

{% block title %}Home{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-screen text-center">
  <h1 class="text-4xl font-bold mb-6">PAK TOURISM</h1>

  <!-- Button for Tourism Spots -->
  <a href="{% url 'all_pages' %}"
     class="inline-block px-6 py-3 rounded-lg bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500
            text-black font-semibold shadow-md hover:from-indigo-600 hover:via-purple-600 hover:to-pink-600
            transform hover:scale-105 transition duration-300 ease-in-out mb-4">
    🌍 View Tourism Spots
  </a>
  <!-- Button for Trips Page -->
<a href="{% url 'trips_home' %}"
   class="inline-block px-6 py-3 rounded-lg bg-gradient-to-r from-green-400 via-teal-500 to-blue-500
          text-black font-semibold shadow-md hover:from-green-500 hover:via-teal-600 hover:to-blue-600
          transform hover:scale-105 transition duration-300 ease-in-out">
  ✈️ book your trip
</a>


  <!-- Button for Bookings (Trips) -->
  
</div>
{% endblock %}
